 </head>
 <body>

	</h1>
	<h2 style="text-align: left; font-size: 14pt; font-weight: bold;">

	</h2>
	<table align="center">
	   <tr>
		<th><img src="images/we/коваль.jpg" alt="Коваль К" hspace="20px" vspace= "5px" height="125px"></th>
		<th><img src="images/we/музика.jpg" alt="Музика С" hspace="20px" vspace= "5px" height="125px"></th>
		<th><img src="images/we/папка.jpg" alt="Папка О" hspace="20px" vspace= "5px" height="125px"></th>
		<th><img src="images/we/соболевський.jpg" alt="Соболевський Г" hspace="20px" vspace= "5px" height="125px"></th>

		<td>Коваль Кирило</td>
		<td>Музика Стефан</td>
		<td>Папка Олег</td>
		<td>Соболевський Гліб</td>
	   </tr>	
	  <table width="35%"  cellpadding="5" cellspacing="0">
		   <tr>
			<th><button onclick="labButtonClick(1)" class="labbutons">Лабораторна робота №1</button></th>
			<th><button onclick="labButtonClick(2)" class="labbutons">Лабораторна робота №2</button></th>
			<th><button onclick="labButtonClick(3)" class="labbutons">Лабораторна робота №3</button></th>
			<th><button onclick="labButtonClick(4)" class="labbutons">Лабораторна робота №4</button></th>
			<th><button onclick="labButtonClick(5)" class="labbutons">Лабораторна робота №5</button></th>
			<th><button onclick="labButtonClick(6)" class="labbutons">Лабораторна робота №6</button></th>
			<th><button onclick="labButtonClick(7)" class="labbutons">Лабораторна робота №7</button></th>
			<th><button onclick="labButtonClick(8)" class="labbutons">Лабораторна робота №8</button></th>
			<th><button onclick="labButtonClick(9)" class="labbutons">Лабораторна робота №9</button></th>
			<th><button onclick="window.location.replace('http://localhost');" class="labbutons" style="border-radius: 10px; background: linear-gradient(to right, #F6EFD2, #CEAD78);">САЙТ</button></th>
		   </tr>
	  </table>
	  <table width="95%" border="1px" cellpadding="5" cellspacing="0" bgcolor="FFFFFF">
		   <tr>
			<td width="350" height = "800" valign="top" bgcolor="#f0f0f0" id="container">
			</td>
			<td valign="middle" id="infoutput"><output>Місце для виведення інформації</output></div></td>
		   </tr>
	</table>
	
	<script>
		var current_lab;
		var button_amount = 0;
		
		function labButtonClick (i){
			document.getElementById("infoutput").innerHTML = "Оберіть, що ви хочете переглянути з лабораторної роботи №"+i+"...";
			current_lab = i;
			let val = [];
			var k;
			//Очистка
			//document.getElementById("container").innerHTML = "";
			for(k=0;k<2*button_amount; k++){
				var elem = container.lastChild;
				elem.parentNode.removeChild(elem);
			}
			for(k=0;k<val.length; k++){
				val.pop();
			}
			let labbutton = [];
			switch(current_lab){
				case 1:
					labbutton.push('Опис предметного середовища', 'Тема/Мета/Місце розташування ЛР', 'HTML-КОД сторінки', 'HTML-КОД таблиць', 'HTML-КОД форми', 'HTML-КОД зображення', 'Висновки');
					CreateLab (7, val, labbutton)
				break;
				case 2:	
					labbutton.push('Постановка задачі', 'Списки', 'Ідентифікатори', 'Відступи, плаваючі елементи', 'Селектори тегу і класу', 'Інші селектори', 'Групування селекторів');
					CreateLab (7, val, labbutton)
				break;
				case 3:			
					labbutton.push('Тема/мета/Місце розташування', 'Зовн.вигляд макету', 'HTML-код макету', 'Розмітка за допомогою таблиці', 'Розмітка за допомогою плав. блоків', 'HTML-код FLEXBOX сторінки', 'CSS-код FLEXBOX сторінки', 'Висновки');
					CreateLab (8, val, labbutton)
				break;
				case 4:
					labbutton.push('Постановка задачі', 'URL посилання', 'Обробник події handler', 'Вставка <script>', 'Масиви (п.4)', 'Програма (п.6)', 'Висновки');
					CreateLab (7, val, labbutton)
				break;
				case 5:
					labbutton.push('Постановка задачі', 'Динамічні елементи (п.3)', 'Фотогалерея  UniteGallery', 'Слайдер фотографій', 'Слайдер відеоматеріалів', 'Кнопки соц.мереж', 'Інформери','Модуль для мультимедіа', 'Висновки');
					CreateLab (9, val, labbutton)
					break;
				case 6:
					labbutton.push('Тема/мета/посилання на GitHub', 'Динамічні елементи (п.3)', 'Установка Веб-серверу', 'Запит для перегляду', 'Кодування UTF-8', 'Зворотній зв`язок. Відображення дати', 'Висновки');
					CreateLab (7, val, labbutton)
					break;
				case 7:
					labbutton.push('Тема/Постановка', 'Інфологічні моделі', 'Датологічні моделі', 'Скріншоти сайту');
					CreateLab (4, val, labbutton)
					break;
				case 8:
					labbutton.push('Тема/Постановка', "Опис об'єктів предметної галузі для БД", 'Інфологічна модель. Опис', 'Датологічна модель. Опис. Зв`язки між таблицями', 'Реалізація в mySQL, phpMyAdmin', 'Введення, виведення, пошук даних в БД', 'SQL-запити іншого функціоналу сайту. Запис у файл.', 'Авторизація. Сесія.', 'Іконки для вибору мови. Кукі', 'Висновки');
					CreateLab (10, val, labbutton)
					break;
				case 9:
					labbutton.push('Тема/Постановка', "AJAX - запит", 'AJAX у власному сайті', 'Функціонал сайту', 'Порівнняння функц. першої та останньої лаби', 'Висновки');
					CreateLab (6, val, labbutton)
					break;
				default:
					button_amount = 1;
					var Div = document.createElement("div");
					Div.innerHTML = "<p>Пробач... Ми ще не зробили цю лабку!</p>";
					container.appendChild(Div);
					var Img = document.createElement("img");
					Img.src = "images/proskura.jpg";
					Img.width = "350";
					container.appendChild(Img);
					break;
			}
		}
		
		function CreateLab (butts, val, labbuton){
			button_amount = butts;
			for (k=0;k<button_amount;k++){
				var input = document.createElement('input');
				input.type = 'button';
				input.id = k;
				val=labbuton;
				input.value = val[k];
				input.onclick=function() {PartButtonClick(this.id)};							
				container.appendChild(input);
				container.appendChild(document.createElement('br'));
			}	
		}

		function PartButtonClick (k){			
			document.getElementById("infoutput").innerHTML = "";				
			var img;
			k++;
			var imgSrc = "images/Lab" + current_lab + "/" + k + ".jpg";
			// усе має бути представлено у зображеннях формату .jpg виду
			// images/Labi/k.jpg

			// де і - це номер лабораторної
			//де k - це номер кнопки (в кожній ЛР різна к-ть кнопок!!!)
			
			// Наприклад images/Lab4/8.jpg
			
			img = new Image();
			img.src = imgSrc;
			document.getElementById('infoutput').appendChild(img);
		}
	  </script>
 </body>
</html>
